<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual HTML Designer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <i data-lucide="layout"></i>
                <h1>Visual Designer</h1>
            </div>
            <div class="toolbar">
                <input type="file" id="file-input" style="display: none;" accept="image/*">
                <button id="upload-btn" title="Upload Image">
                    <i data-lucide="image-plus"></i>
                    <span>Upload</span>
                </button>
                <button id="copy-btn" title="Copy HTML">
                    <i data-lucide="copy"></i>
                    <span>Copy</span>
                </button>
                <button id="reset-btn" title="Reset View">
                    <i data-lucide="refresh-cw"></i>
                </button>
            </div>
        </header>
        <main>
            <div id="editor-pane">
                <div class="pane-header">
                    <div class="header-left">
                        <i data-lucide="code"></i>
                        <span>Source Code</span>
                    </div>
                </div>
                <!-- Monaco editor container -->
                <div id="code-editor"></div>
            </div>
            <div id="resizer"></div>
            <div id="preview-pane">
                <div class="pane-header">
                    <div class="header-left">
                        <i data-lucide="eye"></i>
                        <span>Live Preview</span>
                    </div>
                    <div class="preview-controls">
                         <span id="target-info">Select an element to edit</span>
                    </div>
                </div>
                <div class="iframe-container">
                    <iframe id="preview-frame"></iframe>
                </div>
            </div>
        </main>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="editor.js"></script>
</body>
</html>
